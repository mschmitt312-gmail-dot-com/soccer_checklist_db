{% extends "base.html" %}
{% block title %}Browse Sets — Soccer Card Checklist{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-3">
  <h2 class="mb-0"><i class="bi bi-collection me-2"></i>Card Sets</h2>
</div>

<!-- Search & filter bar -->
<div class="card shadow-sm border-0 mb-4 p-3">
  <form id="filter-form" class="row g-2 align-items-end">
    <div class="col-md-5">
      <label class="form-label small text-muted mb-1">Search</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input
          type="search" name="q" class="form-control"
          placeholder="Set name or publisher…"
          value="{{ q }}"
          hx-get="/sets"
          hx-target="#results"
          hx-trigger="keyup changed delay:400ms, search"
          hx-include="#filter-form"
          hx-push-url="true"
        >
        <span class="input-group-text search-spinner htmx-indicator">
          <span class="spinner-border spinner-border-sm"></span>
        </span>
      </div>
    </div>
    <div class="col-md-2">
      <label class="form-label small text-muted mb-1">Decade</label>
      <select name="decade" class="form-select"
              hx-get="/sets" hx-target="#results"
              hx-include="#filter-form" hx-push-url="true">
        <option value="">All decades</option>
        {% for row in decades %}
          <option value="{{ row.decade }}"
            {% if decade == row.decade|string %}selected{% endif %}>
            {{ row.decade }}s
          </option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-3">
      <label class="form-label small text-muted mb-1">Country</label>
      <select name="country" class="form-select"
              hx-get="/sets" hx-target="#results"
              hx-include="#filter-form" hx-push-url="true">
        <option value="">All countries</option>
        {% for row in countries %}
          <option value="{{ row.country }}"
            {% if country == row.country %}selected{% endif %}>
            {{ row.country }}
          </option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-2">
      <a href="/sets" class="btn btn-outline-secondary w-100">
        <i class="bi bi-x-circle me-1"></i>Clear
      </a>
    </div>
  </form>
</div>

<!-- Results (replaced by HTMX partial) -->
<div id="results">
  {% include "sets/list_rows.html" %}
</div>
{% endblock %}
