<tr id="new-player-link-row">
  <td colspan="3" class="p-0">
    <form class="d-flex align-items-center gap-2 p-3 flex-wrap"
          style="background: rgba(122,92,56,.04);"
          hx-post="/editor/players/{{ player_id }}/links"
          hx-target="#player-links-list"
          hx-swap="beforeend"
          hx-on::after-request="if(event.detail.successful){ this.reset(); document.getElementById('new-player-link-row').remove(); }">

      <input type="text" name="link_name" class="form-control form-control-sm" style="max-width:200px;"
             placeholder="Link name e.g. Transfermarkt" required autofocus>

      <input type="url" name="link_url" class="form-control form-control-sm" style="flex:1; min-width:220px;"
             placeholder="https://…" required>

      <div class="d-flex gap-1 flex-shrink-0">
        <button type="submit" class="btn btn-outline-secondary btn-sm py-0 px-2" title="Add link">
          <i class="bi bi-check-lg"></i>
        </button>
        <button type="button" class="btn btn-outline-secondary btn-sm py-0 px-2" title="Cancel"
                onclick="document.getElementById('new-player-link-row').remove()">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

    </form>
  </td>
</tr>
