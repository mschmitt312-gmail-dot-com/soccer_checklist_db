{% if saved %}
<div class="alert alert-light border-start border-success border-3 py-2 mb-3"
     style="font-family:'Crimson Text',serif; font-size:.95rem;">
  <i class="bi bi-check-circle-fill text-success me-2"></i>Metadata saved successfully.
</div>
{% endif %}

<form hx-post="/editor/sets/{{ the_set.set_id }}/metadata"
      hx-target="#metadata-form-wrap"
      hx-swap="innerHTML">

  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Publisher</label>
      <input type="text" class="form-control form-control-sm" name="publisher"
             value="{{ the_set.publisher or '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label">Set Name</label>
      <input type="text" class="form-control form-control-sm" name="set_name"
             value="{{ the_set.set_name or '' }}">
    </div>
    <div class="col-md-3">
      <label class="form-label">Year Start</label>
      <input type="number" class="form-control form-control-sm" name="year_start"
             value="{{ the_set.year_start or '' }}" placeholder="e.g. 1923">
    </div>
    <div class="col-md-3">
      <label class="form-label">Year End</label>
      <input type="number" class="form-control form-control-sm" name="year_end"
             value="{{ the_set.year_end or '' }}" placeholder="optional">
    </div>
    <div class="col-md-3">
      <label class="form-label">Season (raw)</label>
      <input type="text" class="form-control form-control-sm" name="season_raw"
             value="{{ the_set.season_raw or '' }}" placeholder="e.g. 1880s/1890s">
    </div>
    <div class="col-md-3">
      <label class="form-label">Country</label>
      <input type="text" class="form-control form-control-sm" name="country"
             value="{{ the_set.country or '' }}"
             list="country-options" autocomplete="off">
      <datalist id="country-options">
        {% for c in countries %}
        <option value="{{ c }}">
        {% endfor %}
      </datalist>
    </div>
    <div class="col-md-3">
      <label class="form-label">Category</label>
      <select class="form-select form-select-sm" name="category">
        <option value="football" {% if (the_set.category or 'football') == 'football' %}selected{% endif %}>Football</option>
        <option value="other"    {% if the_set.category == 'other' %}selected{% endif %}>Other</option>
      </select>
    </div>
    <div class="col-md-3">
      <label class="form-label">Total Cards (declared)</label>
      <input type="number" class="form-control form-control-sm" name="total_cards"
             value="{{ the_set.total_cards or '' }}">
    </div>
    <div class="col-12">
      <label class="form-label">Source URL</label>
      <input type="url" class="form-control form-control-sm" name="source_url"
             value="{{ the_set.source_url or '' }}">
    </div>
  </div>

  <div class="mt-3 d-flex gap-2">
    <button type="submit" class="btn btn-success btn-sm">
      <i class="bi bi-floppy me-1"></i>Save Metadata
    </button>
    <a href="/sets/{{ the_set.set_id }}" class="btn btn-outline-secondary btn-sm">
      Cancel
    </a>
  </div>
</form>
