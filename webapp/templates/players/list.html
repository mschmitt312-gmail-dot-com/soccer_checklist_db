{% extends "base.html" %}
{% block title %}Players — Football Card Checklist{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-3">
  <h2 class="mb-0"><i class="bi bi-people me-2"></i>Players</h2>
</div>

<!-- Search & filter -->
<div class="card shadow-sm border-0 mb-4 p-3">
  <form id="player-filter" class="row g-2 align-items-end">
    <div class="col-md-5">
      <label class="form-label small text-muted mb-1">Player name</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person-search"></i></span>
        <input
          type="search" name="q" class="form-control"
          placeholder="Last name, first name…"
          value="{{ q }}"
          hx-get="/players"
          hx-target="#results"
          hx-trigger="keyup changed delay:400ms, search"
          hx-include="#player-filter"
          hx-push-url="true"
        >
      </div>
    </div>
    <div class="col-md-3">
      <label class="form-label small text-muted mb-1">Club</label>
      <input type="search" name="club" class="form-control"
             placeholder="e.g. Arsenal"
             value="{{ club }}"
             hx-get="/players" hx-target="#results"
             hx-include="#player-filter" hx-push-url="true"
             hx-trigger="keyup changed delay:400ms, search">
    </div>
    <div class="col-md-2">
      <label class="form-label small text-muted mb-1">Country</label>
      <input type="search" name="country" class="form-control"
             placeholder="e.g. England"
             value="{{ country }}"
             hx-get="/players" hx-target="#results"
             hx-include="#player-filter" hx-push-url="true"
             hx-trigger="keyup changed delay:400ms, search">
    </div>
    <div class="col-md-2">
      <a href="/players" class="btn btn-outline-secondary w-100">
        <i class="bi bi-x-circle me-1"></i>Clear
      </a>
    </div>
  </form>
</div>

<div id="results">
  {% include "players/list_rows.html" %}
</div>
{% endblock %}
