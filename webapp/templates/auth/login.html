{% extends "base.html" %}
{% block title %}Sign In — Football Card Checklist{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-12 col-sm-9 col-md-6 col-lg-4">

    <!-- Header -->
    <div class="text-center mb-4">
      <i class="bi bi-card-checklist" style="font-size:2.2rem; color:var(--sepia);"></i>
      <h2 class="mt-2 mb-0" style="font-family:'Playfair Display',serif; letter-spacing:.06em;">
        Editor Sign In
      </h2>
      <p class="text-muted small mt-1" style="font-family:'Crimson Text',serif;">
        Access is restricted to authorised editors
      </p>
    </div>

    <!-- Card -->
    <div class="card shadow-sm">
      <div class="card-body p-4">

        {% if error %}
        <div class="alert alert-light border-start border-danger border-3 py-2 mb-3"
             style="font-family:'Crimson Text',serif; font-size:.95rem;">
          <i class="bi bi-exclamation-triangle-fill text-danger me-2"></i>{{ error }}
        </div>
        {% endif %}

        <form method="post" action="/auth/login">
          <input type="hidden" name="next" value="{{ next }}">

          <div class="mb-3">
            <label class="form-label" for="email">Email address</label>
            <input type="email" class="form-control" id="email" name="email"
                   placeholder="editor@example.com" required autofocus>
          </div>

          <div class="mb-4">
            <label class="form-label" for="password">Password</label>
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="••••••••" required>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-success py-2">
              <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
          </div>
        </form>

        <!-- Google OAuth hook — uncomment when ready -->
        <!--
        <div class="vintage-divider my-3" style="font-size:.7rem;">or</div>
        <div class="d-grid">
          <a href="/auth/google" class="btn btn-outline-secondary py-2">
            <i class="bi bi-google me-2"></i>Sign in with Google
          </a>
        </div>
        -->

      </div>
    </div>

    <p class="text-center mt-3 small" style="color:var(--grey-mid); font-family:'Crimson Text',serif;">
      <a href="/" style="color:var(--grey-mid);">
        <i class="bi bi-arrow-left me-1"></i>Back to the archive
      </a>
    </p>

  </div>
</div>
{% endblock %}
